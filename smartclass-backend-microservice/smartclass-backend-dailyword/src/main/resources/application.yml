# 公共配置文件
spring:
  application:
    name: smartclass-backend-dailyword
  cloud:
    nacos:
      discovery:
        # P1-6: 通过环境变量注入，避免硬编码
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}

  # 默认 dev 环境（生产通过环境变量 SPRING_PROFILES_ACTIVE 切换）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # todo 取消注释开启分布式 session（须先配置 Redis）
    store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_class}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  # Redis 配置
  # todo 需替换配置，然后取消注释
  data:
    redis:
      database: 0
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 5000
      password: ${REDIS_PASSWORD}
  # Elasticsearch 配置
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 100MB
      max-request-size: 100MB
server:
  address: 0.0.0.0
  port: 10005
  servlet:
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
        path: "/"
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 微信相关
wx:
  # 微信公众平台
  # todo 需替换配置
  mp:
    token: ${WX_MP_TOKEN:}
    aesKey: ${WX_MP_AES_KEY:}
    appId: ${WX_MP_APP_ID:}
    secret: ${WX_MP_SECRET:}
    config-storage:
      http-client-type: HttpClient
      key-prefix: wx
      redis:
        # P1-7: 复用主 Redis 配置或独立注入环境变量
        host: ${WX_REDIS_HOST:127.0.0.1}
        port: 6379
      type: Memory
  # 微信开放平台
  # todo 需替换配置
  open:
    appId: ${WX_OPEN_APP_ID:}
    appSecret: ${WX_OPEN_APP_SECRET:}
# 对象存储
# todo 需替换配置
cos:
  client:
    accessKey: ${COS_ACCESS_KEY:}
    secretKey: ${COS_SECRET_KEY:}
    region: ap-nanjing
    bucket: ${COS_BUCKET:}
    # 文件上传配置
    upload:
      # 最大上传大小配置（单位：MB）
      max-avatar-size: 2
      max-video-size: 100
      max-document-size: 20
      max-material-size: 50
      # 允许的文件类型
      allowed-video-types: mp4,avi,mov,flv,wmv
      allowed-document-types: pdf,doc,docx,ppt,pptx,xls,xlsx,txt
      allowed-material-types: pdf,doc,docx,ppt,pptx,xls,xlsx,txt,zip,rar,7z
# 接口文档配置已迁移到 Knife4jConfig.java 配置类
# P1-4: Actuator 监控端点（仅暴露 health/info，避免敏感信息泄漏）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
# P1-2/P1-9: Feign 超时配置（避免因下游服务慢导致级联阻塞）
feign:
  client:
    config:
      default:
        connect-timeout: 2000
        read-timeout: 5000

