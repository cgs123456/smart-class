server:
  port: 8101

# P1-1: Nacos 配置中心说明
# 当前架构仅使用 Nacos 作为服务发现注册中心，未启用配置中心。
# 如需启用，可在各服务 application.yml 添加 spring.cloud.nacos.config.* 配置，
# 并将 application.yml 中可变配置迁移至 Nacos 维护（建议保持 bootstrap 加载顺序）。
# 保守起见暂不强制修改所有服务，避免破坏现有架构。

# P1-8: 网关限流说明
# 当前网关未配置限流。建议后续接入 Sentinel 或 Spring Cloud Gateway RequestRateLimiter，
# 通过配置中心动态调整限流规则；当前保守处理，不强制实现。

spring:
  application:
    name: smartclass-backend-gateway
  cloud:
    gateway:
      routes:
        - id: smartclass-backend-user
          uri: lb://smartclass-backend-user
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-announcement
          uri: lb://smartclass-backend-announcement
          predicates:
            - Path=/api/announcement/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-circle
          uri: lb://smartclass-backend-circle
          predicates:
            - Path=/api/circle/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-dailyarticle
          uri: lb://smartclass-backend-dailyarticle
          predicates:
            - Path=/api/dailyarticle/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-dailyword
          uri: lb://smartclass-backend-dailyword
          predicates:
            - Path=/api/dailyword/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-intelligence
          uri: lb://smartclass-backend-intelligence
          predicates:
            - Path=/api/intelligence/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-file
          uri: lb://smartclass-backend-file
          predicates:
            - Path=/api/file/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-feedback
          uri: lb://smartclass-backend-feedback
          predicates:
            - Path=/api/feedback/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-course
          uri: lb://smartclass-backend-course
          predicates:
            - Path=/api/course/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-stats
          uri: lb://smartclass-backend-stats
          predicates:
            - Path=/api/stats/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-learn-schedule
          uri: lb://smartclass-backend-learn-schedule
          predicates:
            - Path=/api/learn-schedule/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-search
          uri: lb://smartclass-backend-search
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=2

        - id: smartclass-backend-pay
          uri: lb://smartclass-backend-pay
          predicates:
            - Path=/api/pay/**
          filters:
            - StripPrefix=2
    nacos:
      discovery:
        # P1-6: 通过环境变量注入，避免硬编码
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}

# JWT 网关校验配置（必须与 user 服务的 jwt.secret 保持一致）
jwt:
  secret: ${JWT_SECRET}
  header: Authorization
  token-prefix: "Bearer "

# CORS 允许的来源（生产环境必须显式配置）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# P1-16: Knife4j 文档聚合配置——生产环境必须通过 KNIFE4J_ENABLE=false 关闭，避免接口文档暴露
knife4j:
  gateway:
    # 是否开启网关聚合模式（生产环境置为 false）
    enabled: ${KNIFE4J_ENABLE:false}
    # 排序规则(tag/operation排序)
    tags-sorter: order
    operations-sorter: order
    # 指定服务发现的模式聚合微服务文档
    strategy: discover
    # 服务发现模式的配置
    discover:
      # 开启服务发现（与 gateway.enabled 联动，生产环境关闭）
      enabled: ${KNIFE4J_ENABLE:false}
      # 指定版本号(openapi3)
      version: openapi3
      # 需要排除的微服务(排除网关服务本身)
      excluded-services:
        - smartclass-backend-gateway
      # OpenAPI3配置
      oas3:
        url: /v3/api-docs?group=default
      # 各个聚合服务的个性化配置
      service-config:
        smartclass-backend-user:
          order: 1
          group-name: 用户服务
        smartclass-backend-announcement:
          order: 2
          group-name: 公告服务
        smartclass-backend-circle:
          order: 3
          group-name: 圈子服务
        smartclass-backend-dailyarticle:
          order: 4
          group-name: 每日文章服务
        smartclass-backend-dailyword:
          order: 5
          group-name: 每日单词服务
        smartclass-backend-intelligence:
          order: 6
          group-name: 智能服务
        smartclass-backend-file:
          order: 7
          group-name: 文件服务
        smartclass-backend-feedback:
          order: 8
          group-name: 反馈服务
        smartclass-backend-course:
          order: 9
          group-name: 课程服务
        smartclass-backend-stats:
          order: 10
          group-name: 统计服务
        smartclass-backend-learn-schedule:
          order: 11
          group-name: 学习计划服务
        smartclass-backend-search:
          order: 12
          group-name: 搜索服务
        smartclass-backend-pay:
          order: 13
          group-name: 支付服务

# P1-16: 文档白名单开关（生产环境置为 false，控制文档相关路径放行）
security:
  whitelist:
    doc: ${KNIFE4J_ENABLE:false}

# P1-4: Actuator 监控端点（仅暴露 health/info，避免敏感信息泄漏）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized


