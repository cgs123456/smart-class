# 公共配置文件
spring:
  application:
    name: smartclass-backend-pay
  cloud:
    nacos:
      discovery:
        # P1-6: 通过环境变量注入，避免硬编码
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  # 默认 dev 环境（生产通过环境变量 SPRING_PROFILES_ACTIVE 切换）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_class}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
    # P2-4: HikariCP 连接池调优（避免默认配置在高并发下连接耗尽或泄露）
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # Redis 配置
  data:
    redis:
      database: 0
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 5000
      password: ${REDIS_PASSWORD}
server:
  address: 0.0.0.0
  port: 10011
  servlet:
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
        path: "/"
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
# 支付回调验签配置（生产环境必须通过环境变量注入，留空将拒绝处理回调）
wx:
  pay:
    sign-key: ${WX_PAY_SIGN_KEY:}
alipay:
  public-key: ${ALIPAY_PUBLIC_KEY:}
# P1-4: Actuator 监控端点（仅暴露 health/info，避免敏感信息泄漏）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
# P1-2/P1-9: Feign 超时配置（避免因下游服务慢导致级联阻塞）
feign:
  client:
    config:
      default:
        connect-timeout: 2000
        read-timeout: 5000
