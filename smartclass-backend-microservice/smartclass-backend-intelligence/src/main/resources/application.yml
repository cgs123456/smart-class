# 公共配置文件
spring:
  application:
    name: smartclass-backend-intelligence
  # 默认 dev 环境（生产通过环境变量 SPRING_PROFILES_ACTIVE 切换）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # P1-11: session 配置（与其他服务保持一致）
  session:
    store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/smart_class}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
  # P1-11: Redis 配置（与其他服务保持一致）
  data:
    redis:
      database: 0
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 5000
      password: ${REDIS_PASSWORD}
  cloud:
    nacos:
      discovery:
        # P1-6: 通过环境变量注入，避免硬编码
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
server:
  address: 0.0.0.0
  port: 10008
  servlet:
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
        path: "/"
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# 对象存储
# todo 需替换配置
cos:
  client:
    accessKey: ${COS_ACCESS_KEY:}
    secretKey: ${COS_SECRET_KEY:}
    region: ap-nanjing
    bucket: ${COS_BUCKET:}
    # 文件上传配置
    upload:
      # 最大上传大小配置（单位：MB）
      max-avatar-size: 2
      max-video-size: 100
      max-document-size: 20
      max-material-size: 50
      # 允许的文件类型
      allowed-video-types: mp4,avi,mov,flv,wmv
      allowed-document-types: pdf,doc,docx,ppt,pptx,xls,xlsx,txt
      allowed-material-types: pdf,doc,docx,ppt,pptx,xls,xlsx,txt,zip,rar,7z
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.cgs.smartclass.controller
# Dify API配置
dify:
  chat-messages-path: /chat-messages
  user-prefix: smartclass_user_
  enable-streaming-verbose-log: false
# RAG 课程知识检索配置
rag:
  enabled: ${RAG_ENABLED:false}
  embedding-api-url: ${RAG_EMBEDDING_API_URL:}
  embedding-api-key: ${RAG_EMBEDDING_API_KEY:}
  embedding-model: ${RAG_EMBEDDING_MODEL:text-embedding-v3}
  embedding-dims: ${RAG_EMBEDDING_DIMS:1024}
  top-k: 3
  max-content-length: 2000
# AI 习题生成配置
exercise:
  enabled: ${EXERCISE_ENABLED:false}
  ai-avatar-id: ${EXERCISE_AI_AVATAR_ID:}
  count-per-generate: 5
# P1-4: Actuator 监控端点（仅暴露 health/info，避免敏感信息泄漏）
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
# P1-2/P1-9: Feign 超时配置（避免因下游服务慢导致级联阻塞）
feign:
  client:
    config:
      default:
        connect-timeout: 2000
        read-timeout: 5000
