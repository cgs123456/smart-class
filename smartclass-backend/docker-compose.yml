version: '3.8'

services:
  # 应用服务
  smartclass-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartclass-app
    ports:
      - "8101:8101"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/smart_class?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:smartclass_app}
      - MYSQL_PASSWORD=${MYSQL_APP_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - ES_USERNAME=${ES_USERNAME:-}
      - ES_PASSWORD=${ES_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - KNIFE4J_ENABLE=${KNIFE4J_ENABLE:-false}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - WX_PAY_SIGN_KEY=${WX_PAY_SIGN_KEY:-}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY:-}
    depends_on:
      - mysql
      - redis
      - elasticsearch
    networks:
      - smartclass-network
    restart: always

  # MySQL服务
  mysql:
    image: mysql:8.0
    container_name: smartclass-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=smart_class
      - MYSQL_USER=${MYSQL_USERNAME:smartclass_app}
      - MYSQL_PASSWORD=${MYSQL_APP_PASSWORD}
    # ports: # 生产环境不暴露，仅通过 smartclass-network 内部访问
    #   - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - smartclass-network
    restart: always

  # Redis服务
  redis:
    image: redis:6.2
    container_name: smartclass-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # ports: # 生产环境不暴露，仅通过 smartclass-network 内部访问
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - smartclass-network
    restart: always

  # Elasticsearch服务（升级到 8.x 与 Spring Boot 3.3.x 兼容）
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: smartclass-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ES_PASSWORD:-}
    # ports: # 生产环境不暴露，仅通过 smartclass-network 内部访问
    #   - "9200:9200"
    #   - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - smartclass-network
    restart: always

# 数据卷
volumes:
  mysql-data:
  redis-data:
  elasticsearch-data:

# 网络配置
networks:
  smartclass-network:
    driver: bridge
